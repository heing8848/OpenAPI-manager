services:
  openapi-manager:
    image: "${OPENAPI_MANAGER_IMAGE:-heing8848/openapi-manager:latest}"
    container_name: openapi-manager
    restart: always
    command: --log-dir /app/logs
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data/openapi-manager:/data
      - ./logs:/app/logs
    environment:
      SQL_DSN: "${SQL_DSN:-}"
      REDIS_CONN_STRING: "redis://redis"
      SESSION_SECRET: "${SESSION_SECRET:?Set SESSION_SECRET in .env before starting}"
      TZ: "${TZ:-Asia/Shanghai}"
    depends_on:
      - redis
      - db
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' | awk -F: '{print $$2}'" ]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: "${REGISTRY:-docker.io}/redis:latest"
    container_name: alfredapi-redis
    restart: always

  db:
    image: "${REGISTRY:-docker.io}/mysql:8.2.0"
    container_name: alfredapi-mysql
    restart: always
    volumes:
      - ./data/mysql:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env before starting}"
      MYSQL_USER: "${MYSQL_USER:-oneapi}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env before starting}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-one-api}"
